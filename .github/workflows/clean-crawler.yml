name: Check In

# ✅ 签到续期：运行此 workflow 可重置 7 天计时，保持 "Get Hot News" 正常运行
# ✅ Renewal: Run this workflow to reset the 7-day timer and keep "Get Hot News" active
#
# 📌 自动续签：每周六凌晨 2:00 自动运行
# 📌 Manual: 也可以手动点击 "Run workflow" 按钮

on:
  workflow_dispatch:
  schedule:
    # 每 6 天自动签到续期（周六凌晨 2:00 执行）
    - cron: '0 18 * * 6'

jobs:
  del_runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete all workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0
          delete_workflow_by_state_pattern: "ALL"
          delete_run_by_conclusion_pattern: "ALL"
